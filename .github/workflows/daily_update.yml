name: Daily NBA Stats Updater

on:
  schedule:
    # This runs every day at 8:00 AM UTC (Which is 9:00 AM in Nigeria)
    - cron: '0 7 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually anytime

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Change this if you are using a different version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests nba_api # Add any other libraries your script uses
          pip install pandas requests nba_api python-dotenv

      - name: Run Stat Updater Script
        env: # <--- ADD THIS BLOCK
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python append_csvdata.py # Make sure this matches your exact file name

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nba_player_game_logs.csv
          
          # Only commit if the CSV actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily stat update" && git push)